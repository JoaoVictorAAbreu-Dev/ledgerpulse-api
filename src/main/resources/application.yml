spring:
  application:
    name: ledgerpulse-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ledgerpulse}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:ledgerpulse}
    password: ${DATABASE_PASSWORD:ledgerpulse}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
app:
  security:
    jwt:
      secret: ${JWT_SECRET:ledgerpulse-dev-secret-key-please-change-me}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
server:
  port: 8082
